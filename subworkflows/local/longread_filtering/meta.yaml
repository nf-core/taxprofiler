# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: longread_adapterremoval
description: Filter long-reads for quality 
keywords:
  - quality filtering
  - preprocessing
  - long reads
components:
  - filtlong
  - nanoq
input:
  - ch_reads:
      type: file
      description: |
        Long-read sequencing reads from ONT sequencer.
        Structure: [ val(meta), path(reads) ]
output:
  - reads:
      type: file
      description: |
       Quality filtered reads
        Structure: [ val(meta), path(reads) ]
      pattern: "*.fastq.gz"
  - mqc:
      type: file
      description: |
        Log files for MultiQC 
        Structure: [ path(files) ]
      pattern: "*"
  - versions:
      type: file
      description: |
        File containing software versions
        Structure: path(versions.yml)
      pattern: "versions.yml"
authors:
  - "@LilyAnderssonLee"
maintainers:
  - "@LilyAnderssonLee"
